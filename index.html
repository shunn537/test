<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マリオ風ゲーム</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#87CEEB;
}

#game{
position:relative;
width:100vw;
height:400px;
background:#87CEEB;
overflow:hidden;
}

#ground{
position:absolute;
bottom:0;
width:100%;
height:60px;
background:#2ecc71;
}

#player{
position:absolute;
bottom:60px;
left:100px;
width:40px;
height:40px;
background:red;
border-radius:5px;
}

.enemy{
position:absolute;
bottom:60px;
width:40px;
height:40px;
background:brown;
right:-40px;
}

#score{
position:absolute;
top:10px;
left:10px;
font-size:20px;
color:white;
}
</style>
</head>

<body>

<div id="game">

<div id="score">Score: 0</div>

<div id="player"></div>

<div id="ground"></div>

</div>

<script>

const player = document.getElementById("player")
const game = document.getElementById("game")
const scoreText = document.getElementById("score")

let playerX = 100
let playerY = 0
let velocityY = 0
let gravity = 0.7
let jumpPower = 14
let onGround = true

let keys = {}

let enemies = []
let score = 0
let gameOver = false

document.addEventListener("keydown",e=>{
keys[e.code] = true

if(e.code==="Space" && onGround){
velocityY = jumpPower
onGround = false
}
})

document.addEventListener("keyup",e=>{
keys[e.code] = false
})

function createEnemy(){

let enemy = document.createElement("div")
enemy.classList.add("enemy")
enemy.style.right = "-40px"

game.appendChild(enemy)

enemies.push({
element:enemy,
x:window.innerWidth
})

}

setInterval(()=>{
if(!gameOver){
createEnemy()
}
},2000)

function update(){

if(gameOver) return

if(keys["ArrowRight"]) playerX += 5
if(keys["ArrowLeft"]) playerX -= 5

velocityY -= gravity
playerY += velocityY

if(playerY <= 0){
playerY = 0
velocityY = 0
onGround = true
}

player.style.left = playerX+"px"
player.style.bottom = (playerY+60)+"px"

enemies.forEach((enemy,index)=>{

enemy.x -= 6
enemy.element.style.left = enemy.x+"px"

let ex = enemy.x
let ey = 60

let px = playerX
let py = playerY + 60

if(
px < ex + 40 &&
px + 40 > ex &&
py < ey + 40 &&
py + 40 > ey
){
gameOver = true
alert("ゲームオーバー！ Score: "+score)
location.reload()
}

if(enemy.x < -50){
enemy.element.remove()
enemies.splice(index,1)
score++
scoreText.innerText = "Score: "+score
}

})

requestAnimationFrame(update)
}

update()

</script>

</body>
</html>
