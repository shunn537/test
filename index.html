<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マリオ風ゲーム</title>

<style>

body{
margin:0;
overflow:hidden;
background:#5cc7ff;
font-family:sans-serif;
}

canvas{
display:block;
margin:auto;
background:#5cc7ff;
}

#info{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
}

</style>
</head>

<body>

<div id="info">コイン:0</div>
<canvas id="game" width="900" height="450"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let keys = {}

document.addEventListener("keydown",e=>keys[e.code]=true)
document.addEventListener("keyup",e=>keys[e.code]=false)

let gravity = 0.6

let player={
x:100,
y:0,
w:40,
h:40,
dx:0,
dy:0,
speed:4,
jump:14,
ground:false
}

let worldWidth = 3000
let cameraX = 0

let blocks=[
{x:200,y:350,w:50,h:50},
{x:250,y:350,w:50,h:50},
{x:300,y:350,w:50,h:50},

{x:600,y:300,w:50,h:50},
{x:650,y:300,w:50,h:50},

{x:1000,y:250,w:50,h:50}
]

let coins=[
{x:210,y:310},
{x:260,y:310},
{x:610,y:260},
{x:1010,y:210}
]

let enemies=[
{x:500,y:360,w:40,h:40,dx:2},
{x:900,y:360,w:40,h:40,dx:2}
]

let coinCount=0

function rect(a,b){
return(
a.x<b.x+b.w &&
a.x+a.w>b.x &&
a.y<b.y+b.h &&
a.y+a.h>b.y
)
}

function update(){

player.dx=0

if(keys["ArrowRight"]) player.dx=player.speed
if(keys["ArrowLeft"]) player.dx=-player.speed

if(keys["Space"] && player.ground){
player.dy=-player.jump
player.ground=false
}

player.dy+=gravity

player.x+=player.dx
player.y+=player.dy

player.ground=false

if(player.y+player.h>400){
player.y=400-player.h
player.dy=0
player.ground=true
}

blocks.forEach(b=>{

if(rect(player,b)){

if(player.dy>0){
player.y=b.y-player.h
player.dy=0
player.ground=true
}

}

})

enemies.forEach(e=>{

e.x+=e.dx

if(e.x<0||e.x>worldWidth) e.dx*=-1

if(rect(player,e)){

if(player.dy>0){
e.dead=true
player.dy=-10
}else{
alert("ゲームオーバー")
location.reload()
}

}

})

enemies=enemies.filter(e=>!e.dead)

coins.forEach((c,i)=>{

if(
player.x < c.x+20 &&
player.x+player.w > c.x &&
player.y < c.y+20 &&
player.y+player.h > c.y
){
coins.splice(i,1)
coinCount++
document.getElementById("info").innerText="コイン:"+coinCount
}

})

cameraX=player.x-200
if(cameraX<0) cameraX=0
if(cameraX>worldWidth-canvas.width) cameraX=worldWidth-canvas.width

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#2ecc71"
ctx.fillRect(0,400,canvas.width,50)

ctx.fillStyle="brown"
blocks.forEach(b=>{
ctx.fillRect(b.x-cameraX,b.y,b.w,b.h)
})

ctx.fillStyle="yellow"
coins.forEach(c=>{
ctx.beginPath()
ctx.arc(c.x-cameraX,c.y,10,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="green"
enemies.forEach(e=>{
ctx.fillRect(e.x-cameraX,e.y,e.w,e.h)
})

ctx.fillStyle="red"
ctx.fillRect(player.x-cameraX,player.y,player.w,player.h)

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
